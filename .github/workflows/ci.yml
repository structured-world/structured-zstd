name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p structured-zstd --features hash,std,dict_builder -- -D warnings
      - name: Clippy (bench_internals)
        run: cargo clippy -p structured-zstd --features hash,std,dict_builder,bench_internals --benches -- -D warnings

  test:
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo
      - name: Test
        working-directory: zstd
        run: cargo nextest run --profile ci -p structured-zstd --features hash,std,dict_builder
      - name: Doc tests
        run: cargo test --doc -p structured-zstd --features hash,std,dict_builder

  cross-i686:
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Install i686 target
        run: rustup target add i686-unknown-linux-gnu
      - name: Install 32-bit libs
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cross-i686
      - name: Test (i686)
        working-directory: zstd
        run: cargo nextest run --profile ci -p structured-zstd --features hash,std,dict_builder --target i686-unknown-linux-gnu

  msrv:
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: msrv
      - name: Test (MSRV)
        working-directory: zstd
        run: cargo nextest run --profile ci -p structured-zstd --features hash,std,dict_builder

  codecov:
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov -p structured-zstd --features hash,std,dict_builder --lcov --output-path lcov.info
        working-directory: zstd
      - uses: codecov/codecov-action@v5
        with:
          files: zstd/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    name: Performance regression check (${{ matrix.bench.id }})
    needs: lint
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        bench:
          - id: x86_64-gnu
            target_triple: x86_64-unknown-linux-gnu
            setup_command: ""
          - id: i686-gnu
            target_triple: i686-unknown-linux-gnu
            setup_command: "sudo apt-get update && sudo apt-get install -y gcc-multilib libc6-dev-i386"
          - id: x86_64-musl
            target_triple: x86_64-unknown-linux-musl
            setup_command: "sudo apt-get update && sudo apt-get install -y musl-tools"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate bot token
        id: bot-token
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: dtolnay/rust-toolchain@stable
      - name: Install benchmark target
        run: rustup target add ${{ matrix.bench.target_triple }}

      - name: Install target toolchain dependencies
        if: matrix.bench.setup_command != ''
        run: ${{ matrix.bench.setup_command }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bench-${{ matrix.bench.id }}

      - name: Run benchmarks
        env:
          STRUCTURED_ZSTD_BENCH_TARGET: ${{ matrix.bench.id }}
          STRUCTURED_ZSTD_BENCH_TRIPLE: ${{ matrix.bench.target_triple }}
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: bash .github/scripts/run-benchmarks.sh

      - name: Rename benchmark outputs for matrix artifact
        run: |
          mv benchmark-results.json benchmark-results.${{ matrix.bench.id }}.json
          mv benchmark-report.md benchmark-report.${{ matrix.bench.id }}.md
          mv benchmark-delta.json benchmark-delta.${{ matrix.bench.id }}.json
          mv benchmark-delta.md benchmark-delta.${{ matrix.bench.id }}.md
          mv benchmark-relative.json benchmark-relative.${{ matrix.bench.id }}.json

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.bench.id }}
          path: |
            benchmark-results.${{ matrix.bench.id }}.json
            benchmark-report.${{ matrix.bench.id }}.md
            benchmark-delta.${{ matrix.bench.id }}.json
            benchmark-delta.${{ matrix.bench.id }}.md
            benchmark-relative.${{ matrix.bench.id }}.json
          if-no-files-found: error

      - name: Store benchmark results
        if: steps.bot-token.outputs.token != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "structured-zstd vs C FFI (${{ matrix.bench.id }})"
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.${{ matrix.bench.id }}.json
          github-token: ${{ steps.bot-token.outputs.token }}
          # gh-pages writes are centralized in benchmark-pages after artifact merge.
          auto-push: false
          comment-on-alert: true
          alert-comment-cc-users: "@polaz"
          alert-threshold: "115%"
          fail-threshold: "125%"
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          save-data-file: false
          benchmark-data-dir-path: dev/bench

  benchmark-pages:
    name: Publish benchmark pages payloads
    needs: benchmark
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Checkout gh-pages with push token
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          token: ${{ steps.bot-token.outputs.token }}
          path: gh-pages

      - name: Download benchmark matrix artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: benchmark-*
          path: benchmark-artifacts

      - name: Merge relative/delta payloads
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path("benchmark-artifacts")
          out = Path("merged")
          out.mkdir(parents=True, exist_ok=True)

          relative_records = []
          reference_band = None
          delta_records = []
          target_order = []
          target_counts = {}
          summary_lines = [
              "# Benchmark Summary (multi-target)",
              "",
              "Generated from CI benchmark matrix artifacts.",
              "",
              "## Targets",
              "",
              "| Target | Relative rows | Delta rows |",
              "| --- | ---: | ---: |",
          ]
          delta_md_lines = [
              "# Benchmark Delta Summary (multi-target)",
              "",
              "Canonical rows merged across benchmark targets.",
              "",
          ]
          report_bodies = {}
          delta_md_bodies = {}

          def register_target(target):
              if target not in target_order:
                  target_order.append(target)
              if target not in target_counts:
                  target_counts[target] = {"relative": 0, "delta": 0}

          for rel_path in sorted(root.rglob("benchmark-relative.*.json")):
              payload = json.loads(rel_path.read_text())
              band = payload.get("reference_band")
              if band:
                  if reference_band is not None and reference_band != band:
                      raise SystemExit(f"Inconsistent reference_band in {rel_path}")
                  reference_band = band
              target = payload.get("target", {}).get("id", "unknown")
              rows = payload.get("records", [])
              relative_records.extend(rows)
              register_target(target)
              target_counts[target]["relative"] += len(rows)

          for report_path in sorted(root.rglob("benchmark-report.*.md")):
              target = report_path.name.replace("benchmark-report.", "").replace(".md", "")
              register_target(target)
              report_bodies[target] = report_path.read_text().strip()

          for delta_path in sorted(root.rglob("benchmark-delta.*.json")):
              rows = json.loads(delta_path.read_text())
              delta_records.extend(rows)
              if rows:
                  target = rows[0].get("target") or "unknown"
              else:
                  target = delta_path.name.replace("benchmark-delta.", "").replace(".json", "")
              register_target(target)
              target_counts[target]["delta"] += len(rows)

          for delta_md_path in sorted(root.rglob("benchmark-delta.*.md")):
              target = delta_md_path.name.replace("benchmark-delta.", "").replace(".md", "")
              register_target(target)
              delta_md_bodies[target] = delta_md_path.read_text().strip()

          if not relative_records:
              raise SystemExit("No relative records found in benchmark artifacts")
          if not delta_records:
              raise SystemExit("No delta records found in benchmark artifacts")

          existing_relative_path = Path("gh-pages/dev/bench/benchmark-relative.json")
          existing_records = []
          if existing_relative_path.exists():
              existing_payload = json.loads(existing_relative_path.read_text())
              existing_records = existing_payload.get("records", [])
              existing_band = existing_payload.get("reference_band")
              if reference_band is None and existing_band:
                  reference_band = existing_band

          key = lambda row: (
              row.get("commit_sha"),
              row.get("target"),
              row.get("metric"),
              row.get("key"),
              row.get("generated_at"),
          )
          merged = {}
          for row in existing_records + relative_records:
              merged[key(row)] = row

          merged_relative_payload = {
              "version": 1,
              "targets": sorted(set(target_order)),
              "reference_band": reference_band or {
                  "delta_low": 0.99,
                  "delta_high": 1.05,
              },
              "records": sorted(
                  merged.values(),
                  key=lambda row: (
                      row.get("generated_at") or "",
                      row.get("target") or "",
                      row.get("metric") or "",
                      row.get("key") or "",
                  ),
              ),
          }

          for target in target_order:
              counts = target_counts.get(target, {"relative": 0, "delta": 0})
              summary_lines.append(f"| `{target}` | {counts['relative']} | {counts['delta']} |")
              delta_md_lines.append(f"- `{target}`: {counts['delta']} delta rows, {counts['relative']} relative rows")

          report_lines = ["# Benchmark Report (multi-target)", ""]
          for target in target_order:
              body = report_bodies.get(target)
              if not body:
                  continue
              report_lines.append(f"## Target `{target}`")
              report_lines.append("")
              report_lines.append(body)
              report_lines.append("")
          if len(report_lines) == 2:
              raise SystemExit("No benchmark-report.*.md artifacts found")

          delta_lines = ["# Benchmark Delta Report (multi-target)", ""]
          for target in target_order:
              body = delta_md_bodies.get(target)
              if not body:
                  continue
              delta_lines.append(f"## Target `{target}`")
              delta_lines.append("")
              delta_lines.append(body)
              delta_lines.append("")
          if len(delta_lines) == 2:
              raise SystemExit("No benchmark-delta.*.md artifacts found")

          (out / "benchmark-relative.json").write_text(json.dumps(merged_relative_payload, indent=2) + "\n")
          (out / "benchmark-delta.json").write_text(json.dumps(delta_records, indent=2) + "\n")
          (out / "benchmark-summary.md").write_text("\n".join(summary_lines) + "\n")
          (out / "benchmark-delta-summary.md").write_text("\n".join(delta_md_lines) + "\n")
          (out / "benchmark-report.md").write_text("\n".join(report_lines).strip() + "\n")
          (out / "benchmark-delta.md").write_text("\n".join(delta_lines).strip() + "\n")
          PY

      - name: Publish benchmark reports to gh-pages
        run: |
          mkdir -p gh-pages/dev/bench
          cp merged/benchmark-report.md gh-pages/dev/bench/benchmark-report.md
          cp merged/benchmark-delta.json gh-pages/dev/bench/benchmark-delta.json
          cp merged/benchmark-delta.md gh-pages/dev/bench/benchmark-delta.md
          cp merged/benchmark-summary.md gh-pages/dev/bench/benchmark-summary.md
          cp merged/benchmark-delta-summary.md gh-pages/dev/bench/benchmark-delta-summary.md
          cp merged/benchmark-relative.json gh-pages/dev/bench/benchmark-relative.json
          cp .github/bench-dashboard/index.html gh-pages/dev/bench/index.html
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/bench/index.html dev/bench/benchmark-report.md dev/bench/benchmark-delta.json dev/bench/benchmark-delta.md dev/bench/benchmark-relative.json dev/bench/benchmark-summary.md dev/bench/benchmark-delta-summary.md
          git diff --cached --quiet || git commit -m "chore(bench): publish benchmark reports"
          git push origin gh-pages
