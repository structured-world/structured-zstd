name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p structured-zstd --features hash,std,dict_builder -- -D warnings
      - name: Clippy (bench_internals)
        run: cargo clippy -p structured-zstd --features hash,std,dict_builder,bench_internals --benches -- -D warnings

  test:
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo
      - name: Test
        working-directory: zstd
        run: cargo nextest run --profile ci -p structured-zstd --features hash,std,dict_builder
      - name: Doc tests
        run: cargo test --doc -p structured-zstd --features hash,std,dict_builder

  cross-i686:
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Install i686 target
        run: rustup target add i686-unknown-linux-gnu
      - name: Install 32-bit libs
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cross-i686
      - name: Test (i686)
        working-directory: zstd
        run: cargo nextest run --profile ci -p structured-zstd --features hash,std,dict_builder --target i686-unknown-linux-gnu

  msrv:
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: msrv
      - name: Test (MSRV)
        working-directory: zstd
        run: cargo nextest run --profile ci -p structured-zstd --features hash,std,dict_builder

  codecov:
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov -p structured-zstd --features hash,std,dict_builder --lcov --output-path lcov.info
        working-directory: zstd
      - uses: codecov/codecov-action@v5
        with:
          files: zstd/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    name: Performance regression check
    needs: lint
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate bot token
        id: bot-token
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bench

      - name: Run benchmarks
        run: bash .github/scripts/run-benchmarks.sh

      - name: Upload benchmark delta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-delta
          path: |
            benchmark-delta.json
            benchmark-delta.md
          if-no-files-found: error

      - name: Store benchmark results
        if: steps.bot-token.outputs.token != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "structured-zstd vs C FFI"
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ steps.bot-token.outputs.token }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-comment-cc-users: "@polaz"
          alert-threshold: "115%"
          fail-threshold: "125%"
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          benchmark-data-dir-path: dev/bench

      - name: Checkout gh-pages
        if: steps.bot-token.outputs.token != '' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          token: ${{ steps.bot-token.outputs.token }}
          path: gh-pages

      - name: Publish benchmark reports to gh-pages
        if: steps.bot-token.outputs.token != '' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p gh-pages/dev/bench
          cp benchmark-report.md gh-pages/dev/bench/benchmark-report.md
          cp benchmark-delta.json gh-pages/dev/bench/benchmark-delta.json
          cp benchmark-delta.md gh-pages/dev/bench/benchmark-delta.md
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/bench/benchmark-report.md dev/bench/benchmark-delta.json dev/bench/benchmark-delta.md
          git diff --cached --quiet || git commit -m "chore(bench): publish benchmark reports"
          git push origin gh-pages
